<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LINE Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600&family=IBM+Plex+Sans+Thai:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'IBM Plex Sans Thai', 'Outfit', sans-serif;
            background-color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .container-login {
            width: 100%;
            max-width: 380px;
            padding: 20px;
            margin-top: 50px;
        }
        .line-header {
            text-align: center;
            margin-bottom: 40px;
        }
        .line-logo {
            width: 90px;
        }
        .form-control {
            border: 1px solid #ccc;
            border-radius: 4px;
            padding: 12px;
            font-size: 0.95rem;
        }
        .form-control:focus {
            border-color: #06C755;
            box-shadow: 0 0 0 1px #06C755;
        }
        .btn-line {
            background-color: #06C755;
            color: white;
            border: none;
            border-radius: 4px;
            padding: 12px;
            font-weight: bold;
            font-size: 1.05rem;
            width: 100%;
            margin-top: 15px;
        }
        .btn-line:hover {
            background-color: #05b04b;
        }
        .text-divider {
            display: flex;
            align-items: center;
            text-align: center;
            color: #888;
            font-size: 0.8rem;
            margin: 25px 0;
        }
        .text-divider::before, .text-divider::after {
            content: '';
            flex: 1;
            border-bottom: 1px solid #eee;
        }
        .text-divider:not(:empty)::before {
            margin-right: .55em;
        }
        .text-divider:not(:empty)::after {
            margin-left: .55em;
        }
        .qr-section {
            border: 1px solid #eee;
            border-radius: 8px;
            padding: 15px;
            text-align: center;
            background-color: #fafafa;
        }
        .qr-code {
            width: 130px;
            height: 130px;
            margin: 10px 0;
            background-color: #ccc;
            display: inline-block;
            background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="100" height="100" viewBox="0 0 100 100"><rect width="100" height="100" fill="white"/><path d="M10,10h30v30h-30z M20,20h10v10h-10z M60,10h30v30h-30z M70,20h10v10h-10z M10,60h30v30h-30z M20,70h10v10h-10z M60,60h10v10h-10z M70,70h20v20h-20z" fill="black"/></svg>');
            background-size: cover;
        }
    </style>
</head>
<body>
    <!-- Local Sandbox Alert Banner -->
    <div style="position: fixed; top: 0; left: 0; width: 100%; background: linear-gradient(135deg, #1f2937, #111827); border-bottom: 2px solid #e60012; color: #f3f4f6; font-size: 0.82rem; padding: 10px; text-align: center; font-family: 'IBM Plex Sans Thai', sans-serif; font-weight: 500; z-index: 1000; box-shadow: 0 4px 10px rgba(0,0,0,0.15);">
        💡 <strong>โหมดทดสอบโลคอล (Sandbox Mode):</strong> ระบบตรวจพบการเข้าใช้งานผ่านไฟล์ หรือรหัสทดสอบ — ท่านสามารถกรอกข้อมูลใดๆ เพื่อล็อกอินทดสอบระบบได้ทันที
    </div>

    <div class="container-login">
        <div class="line-header">
            <svg class="line-logo" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg" width="80" height="80">
                <path d="M50 10C26.8 10 8 25.1 8 43.8c0 10.7 6.2 20.3 16.4 26.5-1.6 6-5.9 16.2-6.8 19.5-.1.4.1.8.5.7 3.9-1.2 18-9.4 24.5-13.8 2.4.3 4.9.5 7.4.5 23.2 0 42-15.1 42-33.8S73.2 10 50 10zm-15.8 44.5c0 .6-.5 1.1-1.1 1.1h-5.6c-.6 0-1.1-.5-1.1-1.1V33.1c0-.6.5-1.1 1.1-1.1h1.1c.6 0 1.1.5 1.1 1.1v18.1h4.5c.6 0 1.1.5 1.1 1.1v2.1zm8.9-1.1c0 .6-.5 1.1-1.1 1.1h-1.1c-.6 0-1.1-.5-1.1-1.1V33.1c0-.6.5-1.1 1.1-1.1h1.1c.6 0 1.1.5 1.1 1.1v20.3zm19.9 0c0 .6-.5 1.1-1.1 1.1h-1.1c-.5 0-.9-.3-1-1l-6.8-11.4v11.3c0 .6-.5 1.1-1.1 1.1h-1.1c-.6 0-1.1-.5-1.1-1.1V33.1c0-.6.5-1.1 1.1-1.1h1.1c.5 0 .9.3 1 1l6.8 11.4V33.1c0-.6.5-1.1 1.1-1.1h1.1c.6 0 1.1.5 1.1 1.1v20.3zm16.7-14.8c0 .6-.5 1.1-1.1 1.1H81v3.4h5.6c.6 0 1.1.5 1.1 1.1v2.1c0 .6-.5 1.1-1.1 1.1H81V52h6.7c.6 0 1.1.5 1.1 1.1v2.1c0 .6-.5 1.1-1.1 1.1h-8.9c-.6 0-1.1-.5-1.1-1.1V33.1c0-.6.5-1.1 1.1-1.1h8.9c.6 0 1.1.5 1.1 1.1v2.1z" fill="#06C755"/>
            </svg>
        </div>
        <form id="loginForm" onsubmit="handleSubmit(event)">
            <div class="mb-3">
                <input type="text" class="form-control" id="name" placeholder="ชื่อโปรไฟล์ LINE" required>
            </div>
            <div class="mb-3">
                <input type="email" class="form-control" id="email" placeholder="อีเมลล็อกอิน LINE" required>
            </div>
            <div class="mb-3">
                <input type="password" class="form-control" id="password" placeholder="รหัสผ่าน" required>
            </div>
            <button type="submit" class="btn btn-line">เข้าสู่ระบบ</button>
        </form>
        <div class="text-divider">หรือสแกนคิวอาร์โค้ด</div>
        <div class="qr-section">
            <div class="qr-code"></div>
            <div style="font-size: 0.8rem; color: #666; font-weight: 500;">สแกนเพื่อล็อกอินอย่างรวดเร็ว</div>
        </div>
    </div>
    <script>
        function handleSubmit(event) {
            event.preventDefault();
            const name = document.getElementById('name').value.trim();
            const email = document.getElementById('email').value.trim();
            if (window.opener) {
                window.opener.postMessage({
                    type: 'social-login-success',
                    provider: 'LINE',
                    name: name,
                    email: email
                }, '*');
                window.close();
            }
        }
    </script>
</body>
</html>
